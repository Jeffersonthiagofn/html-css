<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá pitoquin</title>

    <style>

*{
    margin: 0px;
    padding: 0px;
   
}
        body {
            background-color: #F9C1B5;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
           
            
        }

        button {
            position: relative;
            background-color: #fff;
            border: none;
            border-radius: 7%;
            width: 100px;
            height: 50px;
            margin: 10px;
            font-size: 20px;
            cursor: pointer;
            
        }

        p {
            color: #fff;
            text-shadow: 3px 3px 3px rgba(0, 0, 0, 0.651);
            font-size: 30px;
            margin-top: 20%;
           
        }

        .gif {
            width: 100px;
            margin: auto;
            display: flex;
        }
    </style>
</head>
<body>
    <p>Cuzinho hoje?</p>
   
    <img class="gif" src="https://media.tenor.com/eHgXStuRdN8AAAAC/tapa-bunda.gif" alt="">
   
    <button id="sim">SIM</button>
    <button id="nao">NÃO</button>
</body>
<script>
    var btn = document.getElementById("nao");
    btn.addEventListener("mouseover", function() {
        var x = Math.floor(Math.random() * 500);
        var y = Math.floor(Math.random() * 500);
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    });

    var btnSim = document.getElementById("sim");
    btnSim.addEventListener("click", function() {
        window.location.href = "https://www.youtube.com/watch?v=Fs0wds5bfAY";
    });
</script>
</html>
